name: Update E/R Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 1 * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl numpy google-auth google-api-python-client requests

      - name: Generate and upload E/R Dashboard
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GTH_TOKEN: ${{ secrets.GH_TOKEN }}
          ER_EXCEL_FILE_ID: 1giqR1a-KE6PD-WtrkR70uiuTDjWVRDsV
        run: python er_generator.py
