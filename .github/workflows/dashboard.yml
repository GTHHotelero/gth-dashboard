name: GTH Dashboard · Deploy diario

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Generar dashboard
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          LOGO_B64: ${{ secrets.LOGO_B64 }}
        run: python generate_dashboard.py

      - name: Commit y push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "GTH Bot"
          git config user.email "bot@gth.com"

          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/GTHHotelero/gth-dashboard.git

          # Traer últimos cambios remotos
          git fetch origin main

          # Rebase sobre remoto
          git rebase origin/main || git rebase --abort

          # Agregar archivos
          git add index.html db.json

          # Commit solo si hay cambios
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear"
          else
            git commit -m "Dashboard GTH · $(date +'%d/%m/%Y') · automático"
          fi

          # Actualizar nuevamente antes del push
          git pull --rebase origin main

          # Push final
          git push origin HEAD:main
