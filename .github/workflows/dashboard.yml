name: GTH Dashboard · Deploy diario

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 hs Argentina (UTC-3)
  workflow_dispatch:         # también manual

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar y publicar dashboard
        
      -env:
          LOGO_B64: ${{ secrets.LOGO_B64 }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_dashboard.py
