name: GTH Dashboard · Deploy diario

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

concurrency:
  group: gth-dashboard-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Generar dashboard
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          LOGO_B64: ${{ secrets.LOGO_B64 }}
        run: python generate_dashboard.py

      - name: Commit y push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -e

          git config user.name "GTH Bot"
          git config user.email "bot@gth.com"

          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/GTHHotelero/gth-dashboard.git

          echo "Actualizando branch main antes de commitear..."
          git fetch origin main
          git rebase origin/main

          echo "Agregando archivos generados..."
          git add index.html db.json

          if git diff --cached --quiet; then
            echo "Sin cambios para commitear"
            exit 0
          fi

          git commit -m "Dashboard GTH · $(date +'%d/%m/%Y') · automático"

          echo "Intentando push..."
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "Push realizado correctamente"
              exit 0
            fi

            echo "Push rechazado. Reintentando en 5 segundos..."
            sleep 5
          done

          echo "No se pudo hacer push después de 3 intentos"
          exit 1
