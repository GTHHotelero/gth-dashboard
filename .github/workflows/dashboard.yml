name: GTH Dashboard · Deploy diario

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Generar dashboard
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          LOGO_B64: ${{ secrets.LOGO_B64 }}
        run: python generate_dashboard.py

      - name: Commit y push
        run: |
          git config user.name "GTH Bot"
          git config user.email "bot@gth.com"
          git pull origin main --rebase
          git add index.html db.json
          git diff --cached --quiet || git commit -m "Dashboard GTH · $(date +'%d/%m/%Y') · automático"
          git push origin main
