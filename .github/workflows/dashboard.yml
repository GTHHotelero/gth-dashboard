name: GTH Dashboard · Deploy diario

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client pdfminer.six anthropic

      - name: Generate dashboard
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LOGO_B64: ${{ secrets.LOGO_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: python generate_dashboard.py

      - name: Commit and push changes
        run: |
          git config user.name "GTH Bot"
          git config user.email "actions@gth.com.ar"
          git add datos.csv index.html ejecutivo.html
          git status
          git commit -m "auto: update GTH dashboard" || echo "No changes to commit"
          git push origin main
