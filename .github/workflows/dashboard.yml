name: GTH Dashboard · Deploy diario

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-auth google-auth-httplib2 google-api-python-client requests

      - name: Generar y publicar dashboard
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          LOGO_B64: ${{ secrets.LOGO_B64 }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python generate_dashboard.py
