name: Get Service Account Email
on:
  workflow_dispatch:
jobs:
  get-email:
    runs-on: ubuntu-latest
    steps:
      - name: Print service account email
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 -c "import os,json; d=json.loads(os.environ['GDRIVE_SERVICE_ACCOUNT_JSON']); print('EMAIL:', d['client_email'])"
